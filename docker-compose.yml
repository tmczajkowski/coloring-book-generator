version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coloring-backend
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
      - NODE_ENV=production
      - OPENAI_API_KEY= # your OpenAI API key here sk-XXX
      - PRINTER_URI= # exmple ipp://192.168.1.188/ipp/print
    volumes:
      - data:/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Optional: forward timeout to Vite build (frontend also adapts at runtime via /api/config)
        VITE_OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS}
    container_name: coloring-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  data:
    driver: local

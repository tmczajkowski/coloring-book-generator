services:
  backend:
    image: ghcr.io/patresss/coloring-backend:latest
    container_name: coloring-backend
    environment:
      # WYMAGANE - Uzupełnij swoimi kluczami API
      - OPENAI_API_KEY= # OpenAI key for transcription/prompt improvements
      - GEMINI_API_KEY= # Gemini key for image generation

      # OPCJONALNE - Dostosowanie promptów systemowych
      # - PROMPT_COLORING_BOOK= # Główny prompt dla Gemini (instrukcje rysowania kolorowanki)
      # - PROMPT_IMPROVE= # Prompt dla GPT do ulepszania promptów użytkownika
      # - PROMPT_DETECT_REFERENCES= # Prompt dla GPT do wykrywania referencji z plików
    volumes:
      - ./data:/data
      - ./reference:/reference
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    image: ghcr.io/patresss/coloring-frontend:latest
    container_name: coloring-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

services:
  backend:
    image: ghcr.io/patresss/coloring-backend:latest
    container_name: coloring-backend
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY= # Your key sk-XXX
      - PRINTER_URI= # ipp://<IP_or_name>/ipp/print
      - OPENAI_IMAGE_MODEL=gpt-image-1
      - OPENAI_TEXT_MODEL=gpt-4.1-mini
      - OPENAI_STT_MODEL=whisper-1
      - PRINTER_MEDIA=iso_a4_210x297mm
      - OPENAI_TIMEOUT_MS=240000
      - APP_PASSWORD= # Optional - password for accessing the app
    volumes:
      - ./data:/data
      - ./reference:/reference
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    image: ghcr.io/patresss/coloring-frontend:latest
    container_name: coloring-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

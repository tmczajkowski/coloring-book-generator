services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coloring-backend
    environment:
      # WYMAGANE - Uzupełnij swoimi kluczami API
      - OPENAI_API_KEY=
      - GEMINI_API_KEY=

      # OPCJONALNE - Odkomentuj i skonfiguruj według potrzeb
      # - PRINTER_URI=ipp://192.168.1.100/ipp/print
      # - PRINTER_MEDIA=iso_a4_210x297mm
      # - GEMINI_IMAGE_MODEL=gemini-2.5-flash-image
      # - GEMINI_IMAGE_ASPECT_RATIO=2:3
      # - OPENAI_TEXT_MODEL=gpt-5-mini
      # - OPENAI_STT_MODEL=whisper-1
      # - OPENAI_TIMEOUT_MS=240000
      # - APP_PASSWORD=
    volumes:
      - ./data:/data
      - ./reference:/reference
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: coloring-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

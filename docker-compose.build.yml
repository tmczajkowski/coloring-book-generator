services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: coloring-backend
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ../reference:/reference
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: coloring-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

version: "3.9"

services:
  backend:
    image: ${BACKEND_IMAGE:-youruser/coloring-backend}:${TAG:-latest}
    container_name: coloring-backend
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
      - NODE_ENV=production
    volumes:
      - ./data:/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    image: ${FRONTEND_IMAGE:-youruser/coloring-frontend}:${TAG:-latest}
    container_name: coloring-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

